<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory | CenterPoint Grocery</title>
  <meta name="description" content="Browse CenterPoint Grocery inventory. Search by product and department." />
  <link rel="stylesheet" href="styles.css" />

  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <header class="wrap header">
    <div class="brand">
      <h1>Inventory</h1>
      <p>Search + filter what’s in store.</p>
    </div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="offers.html">Offers</a>
      <a href="admin.html">Owner Login</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="card searchbar">
      <input id="q" type="search" placeholder="Search (e.g., milk, butter, dairy)..." />
      <select id="cat"><option value="">All departments</option></select>
      <label class="badge"><input id="instock" type="checkbox" style="transform:scale(1.1)" /> <span>In stock only</span></label>
      <span class="muted small" id="count"></span>
    </section>

    <section id="grid" class="grid"></section>

    <section class="card">
      <h2>Pricing note</h2>
      <p class="muted small">Public catalog intentionally hides individual item prices. Deals and bundles are shown on the <a href="offers.html">Offers</a> page.</p>
    </section>
  </main>

  <footer class="wrap footer muted">
    © <span id="y"></span> CenterPoint Grocery
  </footer>

  <script src="shared.js"></script>
  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    function unique(arr){ return [...new Set(arr)].sort((a,b)=>a.localeCompare(b)); }

    // Owner view toggle (client-side). This is NOT secure, it only hides in the UI.
    function ownerUnlocked(){
      return localStorage.getItem("cpg_owner_unlocked") === "1";
    }

    function render(rows){
      const grid = document.getElementById("grid");
      const count = document.getElementById("count");
      count.textContent = `${rows.length.toLocaleString()} items shown`;

      grid.innerHTML = rows.map(r => {
        const inStock = (r.in_stock || "").toLowerCase() === "yes";
        const dotClass = inStock ? "dot" : "dot off";
        const stockText = inStock ? "In stock" : "Out of stock";
        const size = r.size ? ` • ${r.size}` : "";
        const dept = r.category ? `<div class="muted small">${r.category}</div>` : "";
        const price = ownerUnlocked() ? `<div style="font-weight:800">$${Number(r.price||0).toFixed(2)}</div>` : "";
        return `
          <div class="card">
            ${dept}
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
              <div style="font-weight:800">${r.name || ""}</div>
              ${price}
            </div>
            <div class="muted small">${r.sku || ""}${size}</div>
            <div class="badge"><span class="${dotClass}"></span> ${stockText}</div>
          </div>
        `;
      }).join("");
    }

    (async () => {
      const all = await loadCSV("products_public.csv");

      // controls
      const q = document.getElementById("q");
      const catSel = document.getElementById("cat");
      const instock = document.getElementById("instock");

      // preset from querystring
      q.value = qsParam("q");
      const presetCat = qsParam("cat");

      const cats = unique(all.map(r => r.category).filter(Boolean));
      cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c; opt.textContent = c;
        catSel.appendChild(opt);
      });
      if(presetCat){ catSel.value = presetCat; }

      function apply(){
        const term = (q.value || "").toLowerCase().trim();
        const cat = catSel.value;
        const onlyStock = instock.checked;

        let rows = all;
        if(cat) rows = rows.filter(r => r.category === cat);
        if(onlyStock) rows = rows.filter(r => (r.in_stock || "").toLowerCase() === "yes");
        if(term){
          rows = rows.filter(r => {
            const blob = `${r.sku} ${r.name} ${r.size} ${r.category}`.toLowerCase();
            return blob.includes(term);
          });
        }
        render(rows);
      }

      q.addEventListener("input", apply);
      catSel.addEventListener("change", apply);
      instock.addEventListener("change", apply);

      apply();
    })();
  </script>
</body>
</html>
